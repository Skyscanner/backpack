name: Check Peer Dependencies

on:
  workflow_call:

permissions:
  contents: read
  id-token: write

jobs:
  check-peer-dependencies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # strictPeerDependencies is false in pnpm-workspace.yaml so that Dependabot
      # bump PRs do not fail install when a package temporarily has unmet peers.
      # This step enforces strict peer dependency checks for human PRs instead.
      - name: Check peer dependencies
        run: pnpm peers check
