name: PR

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash -l {0}

permissions: {}

jobs:
  Create-Build-Cache:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v4.1.0
        # reads packageManager version from package.json automatically

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: |
          pnpm run build
          pnpm run storybook:dist

      - name: Upload Storybook dist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: storybook-dist
          path: libs/backpack-storybook-host/dist-storybook/

  Build:
    permissions:
      actions: read
      contents: read
      statuses: write
      pull-requests: write
    needs: [Create-Build-Cache]
    uses: ./.github/workflows/_build.yml
    secrets:
      GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
      PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}


  StorybookDeploy:
    runs-on: ubuntu-latest
    needs: [Create-Build-Cache]
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Download Storybook dist
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: storybook-dist
        path: libs/backpack-storybook-host/dist-storybook/

    - name: Prepare to deploy Storybook (pull request build)
      run: |
        mkdir build
        mv libs/backpack-storybook-host/dist-storybook $PR_NUMBER
        cp -R $PR_NUMBER build/
      if: github.ref != 'refs/heads/main' && github.repository == github.event.pull_request.head.repo.full_name && github.actor != 'dependabot[bot]'
      env:
        PR_NUMBER: ${{ github.event.pull_request.number }}

    - name: Deploy Storybook to backpack.github.io/storybook-prs
      uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4.0.0
      if: github.ref != 'refs/heads/main' && github.repository == github.event.pull_request.head.repo.full_name && github.actor != 'dependabot[bot]'
      with:
        personal_token: ${{ secrets.DEPLOY_TOKEN }}
        publish_dir: build/
        keep_files: true
        external_repository: backpack/storybook-prs
        publish_branch: main

    - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
      id: app-token
      with:
        app-id: ${{ vars.GH_APP_ID }}
        private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

    - name: Link to the pull request build
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
      if: github.ref != 'refs/heads/main' && github.repository == github.event.pull_request.head.repo.full_name && github.actor != 'dependabot[bot]'
      with:
        github-token: ${{ steps.app-token.outputs.token }}
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `Visit https://backpack.github.io/storybook-prs/${ process.env.PR_NUMBER } to see this build running in a browser.`
          })
      env:
        PR_NUMBER: ${{ github.event.pull_request.number }}
