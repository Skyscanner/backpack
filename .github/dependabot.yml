# Note: Dependabot security updates (driven by GitHub security advisories)
# bypass the cooldown and other settings configured below.
version: 2
updates:
  - package-ecosystem: "npm"
    directories:
      - "/"
      - "/packages"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      skyscanner-internal:
        patterns:
          - "@skyscanner/*"
          - "@skyscanner-internal/*"
      external-dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "@skyscanner/*"
          - "@skyscanner-internal/*"
    cooldown:
      default-days: 30
      exclude:
        - "@skyscanner/*"
        - "@skyscanner-internal/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
    open-pull-requests-limit: 5
    groups:
      skyscanner-internal:
        patterns:
          - "skyscanner/*"
      external-dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "skyscanner/*"
    cooldown:
      default-days: 30
      exclude:
        - "skyscanner/*"
