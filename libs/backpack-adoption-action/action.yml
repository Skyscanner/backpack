name: Backpack Adoption Guard
description: Calculate Backpack adoption and block PRs that reduce adoption after reaching the guard threshold.

inputs:
  dry-run:
    description: If true, adoption drops are reported as warnings instead of failing the PR.
    required: false
    default: "false"
  pattern:
    description: Files scanned for Backpack adoption.
    required: false
    default: "**/*.{jsx,tsx}"
  output-path:
    description: Path for the generated adoption result JSON.
    required: false
    default: backpack-adoption-results.json
  cortex-webhook-uuid:
    description: Cortex webhook UUID used only on the main branch.
    required: false
  cortex-entity:
    description: Cortex entity name, for example carhire-homepage.
    required: false

runs:
  using: composite
  steps:
    - name: Set up Node for Backpack adoption action
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: "22"

    - name: Install Backpack adoption action dependencies
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npm ci --workspaces=false --omit=dev --no-audit --no-fund

    - name: Compile Backpack adoption action
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npx --no-install tsc --project tsconfig.build.json

    - name: Run Backpack adoption analysis
      shell: bash
      run: node ${{ github.action_path }}/dist/index.js
      env:
        INPUT_DRY-RUN: ${{ inputs.dry-run }}
        INPUT_PATTERN: ${{ inputs.pattern }}
        INPUT_OUTPUT-PATH: ${{ inputs.output-path }}
        INPUT_CORTEX-WEBHOOK-UUID: ${{ inputs.cortex-webhook-uuid }}
        INPUT_CORTEX-ENTITY: ${{ inputs.cortex-entity }}
