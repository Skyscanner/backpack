packages:
  - 'packages/*'
  - 'libs/*'

# Settings migrated from .npmrc (pnpm 11 reads workspace config from here)
# strictPeerDependencies is intentionally false: Dependabot bump PRs run pnpm install
# and would fail if a bumped package temporarily creates peer dep mismatches.
# Enforcement for human PRs is handled by the check-peer-dependencies CI workflow instead.
strictPeerDependencies: false
engineStrict: true
publicHoistPattern:
  - '*eslint*'
  - '*stylelint*'
  - '*prettier*'
linkWorkspacePackages: true
shamefullyHoist: true
allowBuilds:
  '@parcel/watcher': true
  '@percy/core': true
  '@skyscanner/eslint-config-skyscanner': true
  core-js: true
  esbuild: true
  less: true
  node-sass: false
  nx: true
  unrs-resolver: true

overrides:
  braces: '3.0.3'

peerDependencyRules:
  allowedVersions:
    eslint: '8'
    react: '18'
    react-dom: '18'

catalogMode: 'strict'
cleanupUnusedCatalogs: true

